name: DAST Scan (ZAP + Nuclei)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 0"

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "https://${{ vars.ALB_URL }}"
          rules_file_name: .zap/rules.tsv
          fail_action: false
          allow_issue_writing: false
          artifact_name: ""

      - name: Upload ZAP HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

      - name: ZAP summary
        id: zap_summary
        if: always()
        run: |
          echo "### ZAP Baseline — ${{ vars.ALB_URL }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f report_json.json ]; then
            HIGH=$(jq '[.site[0].alerts[] | select(.riskcode >= "3")] | length' report_json.json 2>/dev/null || echo 0)
            ALL=$(jq '.site[0].alerts | length' report_json.json 2>/dev/null || echo 0)
            echo "Alert types: **$ALL** total, **$HIGH** High/Critical" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            jq -r '.site[0].alerts[] | "- \(.riskdesc): \(.name)"' report_json.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            echo "high_count=$HIGH" >> "$GITHUB_OUTPUT"
            jq -r '.site[0].alerts[] | select(.riskcode >= "3") | "- \(.name) (\(.riskdesc))"' \
              report_json.json > zap-high-findings.txt 2>/dev/null || touch zap-high-findings.txt
          else
            echo "high_count=0" >> "$GITHUB_OUTPUT"
            touch zap-high-findings.txt
          fi

      - name: Open GitHub Issue for HIGH findings
        if: steps.zap_summary.outputs.high_count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALB_URL: ${{ vars.ALB_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          cat > issue-body.md << 'BODYEOF'
          ## ZAP DAST scan found High/Critical alerts
          BODYEOF
          printf '\nTarget: https://%s\nRun: %s\n\n### Findings\n' "$ALB_URL" "$RUN_URL" >> issue-body.md
          cat zap-high-findings.txt >> issue-body.md
          printf '\n\n---\nThis issue was opened automatically. Close it once findings are reviewed to unblock the next deploy.\n' >> issue-body.md

          gh issue create \
            --title "DAST: ZAP High/Critical findings ($(date -u +%Y-%m-%d))" \
            --body-file issue-body.md \
            --label "dast-alert"

  nuclei:
    name: Nuclei Web Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nuclei
        run: |
          NUCLEI_VERSION="3.3.0"
          wget -q "https://github.com/projectdiscovery/nuclei/releases/download/v${NUCLEI_VERSION}/nuclei_${NUCLEI_VERSION}_linux_amd64.zip" \
            -O nuclei.zip
          unzip -q nuclei.zip nuclei
          chmod +x nuclei
          sudo mv nuclei /usr/local/bin/nuclei
          nuclei --version

      - name: Update Nuclei templates
        run: nuclei -update-templates -silent

      - name: Run Nuclei scan
        run: |
          nuclei \
            -u "https://${{ vars.ALB_URL }}" \
            -tags cve,exposure,vulnerability,sqli,xss,lfi \
            -severity medium,high,critical \
            -o nuclei-results.txt \
            -json-export nuclei-results.json \
            -timeout 30 \
            -rate-limit 20 \
            -silent \
            || true
          touch nuclei-results.txt nuclei-results.json

      - name: Nuclei summary
        id: nuclei_summary
        if: always()
        run: |
          echo "### Nuclei scan — ${{ vars.ALB_URL }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          COUNT=$(wc -l < nuclei-results.txt | tr -d ' ')
          echo "Findings: **$COUNT**" >> "$GITHUB_STEP_SUMMARY"
          if [ "$COUNT" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat nuclei-results.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No findings matched the selected tags/severity._" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "finding_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Open GitHub Issue for Nuclei findings
        if: steps.nuclei_summary.outputs.finding_count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALB_URL: ${{ vars.ALB_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          cat > issue-body.md << 'BODYEOF'
          ## Nuclei scan found vulnerabilities
          BODYEOF
          printf '\nTarget: https://%s\nRun: %s\n\n### Findings\n\n```\n' "$ALB_URL" "$RUN_URL" >> issue-body.md
          cat nuclei-results.txt >> issue-body.md
          printf '\n```\n\n---\nThis issue was opened automatically. Close it once findings are reviewed to unblock the next deploy.\n' >> issue-body.md

          gh issue create \
            --title "DAST: Nuclei findings ($(date -u +%Y-%m-%d))" \
            --body-file issue-body.md \
            --label "dast-alert"

      - name: Upload Nuclei results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nuclei-report
          path: |
            nuclei-results.txt
            nuclei-results.json
          retention-days: 30

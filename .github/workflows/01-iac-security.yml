name: IaC Security Scan

on:
  push:
    paths:
      - "terraform/**"
  pull_request:
    paths:
      - "terraform/**"
  workflow_dispatch:
    

permissions:
  contents: read
  security-events: write

jobs:
  checkov:
    name: Checkov — Terraform misconfiguration scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: |
          checkov \
            --directory terraform/ \
            --framework terraform \
            --output sarif \
            --output-file-path . \
            --config-file .checkov.yml \
            --soft-fail || true
          # Checkov writes results_sarif.sarif into the output path directory
          mv results_sarif.sarif checkov-results.sarif 2>/dev/null || \
            echo '{"version":"2.1.0","runs":[]}' > checkov-results.sarif

      - name: Upload Checkov SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        # Requires GitHub Advanced Security — skip gracefully if not available
        continue-on-error: true
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Upload Checkov results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report
          path: checkov-results.sarif
          retention-days: 30

  tfsec:
    name: tfsec — Terraform security analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tfsec
        run: |
          curl -sLo tfsec https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64
          chmod +x tfsec
          sudo mv tfsec /usr/local/bin/tfsec
          tfsec --version

      - name: Run tfsec
        run: |
          tfsec terraform/ \
            --format sarif \
            --soft-fail \
            > tfsec-results.sarif || true

      - name: Upload tfsec SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

      - name: Upload tfsec results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfsec-report
          path: tfsec-results.sarif
          retention-days: 30

name: IaC Security Scan

on:
  push:
    paths:
      - "terraform/**"
  pull_request:
    paths:
      - "terraform/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov — Terraform misconfiguration scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: |
          checkov \
            --directory terraform/ \
            --framework terraform \
            --output json \
            --output-file-path . \
            --config-file .checkov.yml \
            --soft-fail || true
          mv results_json.json checkov-results.json 2>/dev/null || \
            echo '{"results":{"passed_checks":[],"failed_checks":[]}}' > checkov-results.json

      - name: Checkov summary
        if: always()
        run: |
          echo "### Checkov — Terraform scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          PASSED=$(jq '[.results.passed_checks | length] | add // 0' checkov-results.json 2>/dev/null || echo "?")
          FAILED=$(jq '[.results.failed_checks | length] | add // 0' checkov-results.json 2>/dev/null || echo "?")
          echo "| Result | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | $PASSED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed | $FAILED |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$FAILED" -gt 0 ] 2>/dev/null; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### Failed checks" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            jq -r '.results.failed_checks[] | "\(.check_id)  \(.resource)  \(.check_result.result)"' \
              checkov-results.json 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Checkov results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report
          path: checkov-results.json
          retention-days: 30

  tfsec:
    name: tfsec — Terraform security analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tfsec
        run: |
          curl -sLo tfsec https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64
          chmod +x tfsec
          sudo mv tfsec /usr/local/bin/tfsec
          tfsec --version

      - name: Run tfsec
        run: |
          tfsec terraform/ \
            --format json \
            --soft-fail \
            > tfsec-results.json || true

      - name: tfsec summary
        if: always()
        run: |
          echo "### tfsec — Terraform security analysis" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          COUNT=$(jq '.results | length' tfsec-results.json 2>/dev/null || echo "?")
          echo "Findings: **$COUNT**" >> "$GITHUB_STEP_SUMMARY"
          if [ "$COUNT" -gt 0 ] 2>/dev/null; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            jq -r '.results[] | "\(.rule_id)  [\(.severity)]  \(.description)  (\(.location.filename):\(.location.start_line))"' \
              tfsec-results.json 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload tfsec results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfsec-report
          path: tfsec-results.json
          retention-days: 30

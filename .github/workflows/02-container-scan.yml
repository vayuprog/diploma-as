name: Container Security Scan

on:
  push:
    branches: [main]
    paths:
      - "k8s/**"
  schedule:
    # Every Monday at 06:00 UTC — catches new CVEs in the image
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy — Juice Shop image CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.71.0
          trivy --version

      - name: Scan image with Trivy (JSON)
        run: |
          trivy image \
            --format json \
            --output trivy-results.json \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            bkimminich/juice-shop:v17.1.1

      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.json
          retention-days: 30

      - name: Summary — CRITICAL & HIGH findings
        if: always()
        run: |
          echo "### Trivy scan — bkimminich/juice-shop:v17.1.1" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)

          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CRITICAL | $CRITICAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HIGH     | $HIGH |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "#### CRITICAL vulnerabilities" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL") |
              "\(.VulnerabilityID)  \(.PkgName)  \(.InstalledVersion // "?") → \(.FixedVersion // "no fix")  \(.Title // "")"' \
              trivy-results.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if CRITICAL vulnerabilities found
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Found $CRITICAL CRITICAL vulnerabilities — failing the job."
            exit 1
          fi
          echo "No CRITICAL vulnerabilities found."

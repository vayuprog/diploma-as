name: Container Security Scan

on:
  push:
    branches: [main]
    paths:
      - "k8s/**"
  schedule:
    # Every Monday at 06:00 UTC — catches new CVEs in the image
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy — Juice Shop image CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.58.2
          trivy --version

      - name: Scan image with Trivy (SARIF)
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            bkimminich/juice-shop:v17.1.1 || echo "TRIVY_EXIT=$?" >> "$GITHUB_ENV"

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 30

      - name: Scan image with Trivy (table summary)
        if: always()
        run: |
          trivy image \
            --format table \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 0 \
            bkimminich/juice-shop:v17.1.1

      - name: Fail if CRITICAL vulnerabilities found
        if: env.TRIVY_EXIT != ''
        run: |
          echo "Trivy found CRITICAL/HIGH vulnerabilities (exit code: $TRIVY_EXIT)"
          exit 1
